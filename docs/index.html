## 3. Analysis and Visualization (Python example)

The following Python code demonstrates how to load the table into a pandas DataFrame, compute summary statistics, perform grouped comparisons, and create simple visualizations using seaborn/matplotlib.

Notes before running the code:

- The snippet assumes you have Python 3.8+ and the packages pandas, matplotlib, and seaborn installed. Install with: pip install pandas matplotlib seaborn
- The data is embedded as CSV text in the snippet for reproducibility.

\`\`\`python
# Python analysis: load data, summarize, and visualize
import pandas as pd
import seaborn as sns
import matplotlib.pyplot as plt
from io import StringIO

# Embedded CSV data (small sample)
csv_data = '''CustomerID,AgeGroup,Region,SatisfactionScore,PurchaseAmount,Returned,PurchaseDate
CUST001,25-34,North,8,120.50,No,2026-01-12
CUST002,35-44,South,6,45.00,Yes,2026-01-13
CUST003,18-24,West,9,250.00,No,2026-01-14
CUST004,45-54,East,4,75.99,No,2026-01-15
CUST005,25-34,North,7,99.95,No,2026-01-16
CUST006,35-44,West,5,30.00,Yes,2026-01-17
'''

# Read CSV into DataFrame
df = pd.read_csv(StringIO(csv_data), parse_dates=['PurchaseDate'])

# Basic data checks
print('Data types:')
print(df.dtypes)
print('\\nFirst rows:')
print(df.head())

# Summary statistics for numeric variables
print('\\nSummary statistics for numeric columns:')
print(df[['SatisfactionScore', 'PurchaseAmount']].describe())

# Convert categorical columns to category dtype (useful for memory and plotting)
for col in ['AgeGroup', 'Region', 'Returned']:
    df[col] = df[col].astype('category')

# Grouped analysis: mean satisfaction by AgeGroup
mean_by_age = df.groupby('AgeGroup')['SatisfactionScore'].mean().reset_index()
print('\\nMean satisfaction by AgeGroup:')
print(mean_by_age)

# Visualization: Satisfaction distribution by AgeGroup
sns.set_theme(style='whitegrid')
plt.figure(figsize=(8,5))
sns.boxplot(x='AgeGroup', y='SatisfactionScore', data=df, order=['18-24','25-34','35-44','45-54','55+'])
plt.title('Satisfaction Score by Age Group')
plt.xlabel('Age Group')
plt.ylabel('Satisfaction Score (1-10)')
plt.show()

# Visualization: PurchaseAmount vs SatisfactionScore scatter
plt.figure(figsize=(8,5))
sns.scatterplot(x='PurchaseAmount', y='SatisfactionScore', hue='Region', data=df, s=80)
plt.title('Purchase Amount vs Satisfaction')
plt.xlabel('Purchase Amount')
plt.ylabel('Satisfaction Score')
plt.legend(title='Region')
plt.show()

# Simple test: Are returned items associated with lower satisfaction? Compute group means
print('\\nMean satisfaction by Returned status:')
print(df.groupby('Returned')['SatisfactionScore'].mean())
\`\`\`

Code explanation (brief):

- The CSV is embedded so you can run the script as-is. parse_dates ensures PurchaseDate is a datetime.
- describe() gives count, mean, std, min, max for numeric columns.
- Converting columns to 'category' helps with grouping and plotting.
- Groupby operations show average satisfaction by groups.
- seaborn is used for readable visualizations: a boxplot for distribution by age group and a scatterplot for purchase amount vs satisfaction.

References for libraries and plotting conventions: pandas documentation and seaborn examples provide additional options for customization<sup>2,3</sup>.
