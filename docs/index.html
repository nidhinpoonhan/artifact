## Research Data Documentation

---

## 1. Introduction

### Purpose
This document provides comprehensive documentation for a research study examining the relationship between employee performance metrics, job satisfaction, and organizational factors. The data presented here was collected from a sample of 15 employees across various departments within a mid-sized technology company during Q1 2024.

### Scope
The documentation includes:
- A structured data table containing key variables
- A detailed codebook explaining all variables and their coding schemes
- Contextual information for data interpretation

---

## 2. Data Collection Methodology

### Sample Description
The study employed a stratified random sampling approach to ensure representation across all major departments. Data was collected through:
- Performance review scores (from HR records)
- Anonymous satisfaction surveys (5-point Likert scale)
- Administrative records (tenure, department, employment status)

### Time Frame
- **Collection Period**: January 1 - March 31, 2024
- **Performance Review Period**: Calendar Year 2023
- **Survey Distribution**: February 2024

---

## 4. Codebook

### Overview
This codebook defines all variables used in the dataset, including their names, descriptions, data types, and possible values. Use this section to understand how data was coded and to ensure accurate interpretation of results.

---

### Variable Definitions

#### **Employee_ID**
- **Description**: Unique identifier assigned to each employee in the study
- **Type**: Alphanumeric (Text)
- **Format**: E### (E followed by three digits)
- **Range**: E001 to E015
- **Notes**: Identifiers are randomly assigned and do not correspond to actual employee numbers to maintain confidentiality

---

#### **Department**
- **Description**: The primary organizational department where the employee works
- **Type**: Categorical (Nominal)
- **Possible Values**:
  - **ENG** = Engineering
  - **MKT** = Marketing
  - **HR** = Human Resources
  - **FIN** = Finance
- **Notes**: Employees assigned to only one primary department; cross-functional roles coded based on primary reporting line

---

#### **Tenure_Years**
- **Description**: Length of continuous employment with the organization, measured in years
- **Type**: Continuous (Numeric)
- **Unit**: Years (decimal format)
- **Range**: 0.5 to 8.2 years
- **Precision**: Calculated to one decimal place (e.g., 3.5 years = 3 years, 6 months)
- **Notes**: Tenure calculated as of the survey distribution date (February 15, 2024)

---

#### **Employment_Status**
- **Description**: Current employment classification of the employee
- **Type**: Categorical (Nominal)
- **Possible Values**:
  - **FT** = Full-Time (≥35 hours per week, benefits-eligible)
  - **PT** = Part-Time (20-34 hours per week, limited benefits)
  - **CT** = Contract (temporary or project-based, no benefits)
- **Notes**: Status reflects official HR classification at time of data collection

---

#### **Performance_Score**
- **Description**: Annual performance evaluation score based on standardized company review process
- **Type**: Continuous (Numeric)
- **Scale**: 1.0 to 5.0
- **Range**: 3.2 to 4.8 (in this sample)
- **Precision**: One decimal place
- **Interpretation**:
  - **1.0 - 1.9**: Needs Significant Improvement
  - **2.0 - 2.9**: Below Expectations
  - **3.0 - 3.4**: Meets Minimum Expectations
  - **3.5 - 4.4**: Meets Expectations
  - **4.5 - 5.0**: Exceeds Expectations
- **Notes**: Scores based on supervisor ratings across multiple competency areas; averaged to create composite score

---

#### **Satisfaction_Level**
- **Description**: Employee's self-reported overall job satisfaction
- **Type**: Ordinal (Categorical)
- **Scale**: 1 to 5 (5-point Likert scale)
- **Possible Values**:
  - **1** = Very Dissatisfied
  - **2** = Dissatisfied
  - **3** = Neutral
  - **4** = Satisfied
  - **5** = Very Satisfied
- **Survey Question**: "Overall, how satisfied are you with your current position?"
- **Notes**: Collected via anonymous online survey; integer values only (no decimals)

---

## 5. Data Quality and Limitations

### Missing Data
No missing values are present in this dataset. All 15 employees provided complete responses across all variables.

### Potential Limitations
- **Sample Size**: The relatively small sample (n=15) limits generalizability
- **Self-Report Bias**: Satisfaction levels are self-reported and may be subject to social desirability bias
- **Cross-Sectional Design**: Data represents a single point in time; causal inferences are limited
- **Single Organization**: Findings may not generalize to other organizational contexts

---

## 6. Usage Guidelines

### Recommended Applications
This dataset is suitable for:
- Correlation analysis between performance and satisfaction
- Comparative analysis across departments
- Exploratory data visualization
- Teaching and learning statistical methods
